spring.application.name=ms-busqueda

server.port=8086

# BASE DE DATOS
spring.datasource.url=jdbc:mysql://localhost:3306/busqueda_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# OTROS MICROSERVICIOS EJECUTADOS LOCALMENTE
ms.auth.url=http://localhost:8082
ms.catalogo.url=http://localhost:8081

# SPRING SECURITY
spring.security.user.name=admin
spring.security.user.password=admin123

# EUREKA CLIENT
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true