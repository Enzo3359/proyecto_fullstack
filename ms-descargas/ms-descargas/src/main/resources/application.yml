server:
  port: 8084

spring:
  profiles:
    active: dev
  application:
    name: ms-descargas


  # CONFIGURACIÓN DE LA BASE DE DATOS (MARIADB EN LARAGON)
  datasource:
    url: jdbc:mariadb://localhost:3306/durocplus_descargas_db
    username: root
    password: "" # En Laragon la clave por defecto viene vacía
    driver-class-name: org.mariadb.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

# CONFIGURACIÓN PERSONALIZADA PARA TUS FEIGN CLIENTS
ms:
  auth:
    url: http://localhost:8082   # URL del microservicio de autenticación de tu compańero
  catalogo:
    url: http://localhost:8083   # [AGREGAR ESTO] URL del microservicio de catálogo (asígnale un puerto ficticio por ahora)

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true