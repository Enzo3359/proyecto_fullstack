spring:
  application:
    name: ms-registro

  datasource:
    url: jdbc:mariadb://localhost:3306/usuarios_db?createDatabaseIfNotExist=true
    username: root
    password: ""
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8082

ms:
  suscripcion:
    url: http://localhost:8085

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
