spring:
  application:
    name: ms-busqueda

  datasource:
    url: jdbc:mysql://localhost:3306/busqueda_db?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8086

ms:
  auth:
    url: http://localhost:8082
  catalogo:
    url: http://localhost:8081

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
management:
  endpoints:
    web:
      exposure:
        include: health, info
  info:
    app:
      name: ms-busqueda
      version: 1.0.0